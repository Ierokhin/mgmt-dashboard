<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Dashboard · FY 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    :root {
      --bg: #f1ede5;
      --card: #ffffff;
      --card-border: #e3dfd6;
      --card-border-light: #ece8df;

      --text: #1a1a1a;
      --text-dim: #6e6b66;
      --text-faint: #a8a59f;

      --c-ebitda: #ea580c;
      --c-margin: #7c3aed;
      --c-gp: #0d9488;
      --c-sales: #2563eb;
      --c-cash: #0891b2;
      --c-channel: #be185d;

      --c-pos: #16a34a;
      --c-neg: #dc2626;
      --c-warn: #d97706;

      --c-pos-soft: #dcfce7;
      --c-neg-soft: #fee2e2;
      --c-warn-soft: #fef3c7;
      --c-pos-text: #166534;
      --c-neg-text: #991b1b;
      --c-warn-text: #92400e;
      --c-ebitda-soft: #fff1e6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      line-height: 1.5;
      font-weight: 400;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { padding: 32px 40px 80px; }
    .container { max-width: 1480px; margin: 0 auto; }

    /* ===== HEADER ===== */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 28px; margin-bottom: 18px; gap: 24px; flex-wrap: wrap;
    }
    .logo-section { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 40px; height: 40px;
      background: var(--text); color: var(--bg);
      display: grid; place-items: center;
      font-weight: 800; font-size: 22px;
      letter-spacing: -0.05em; border-radius: 6px;
    }
    .title {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
    }
    .title .sep { color: var(--text-faint); font-weight: 300; margin: 0 8px; }
    .title .sub { color: var(--text-dim); font-weight: 400; }

    .header-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .date-stamp {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-dim); font-weight: 500;
    }
    .live-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--c-pos-soft); color: var(--c-pos-text);
      padding: 8px 14px; border-radius: 99px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    }
    .live-pill::before {
      content: ''; width: 7px; height: 7px;
      background: var(--c-pos); border-radius: 99px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-pill.demo { background: var(--c-ebitda-soft); color: var(--c-ebitda); }
    .live-pill.demo::before { background: var(--c-ebitda); }
    .refresh-btn {
      background: var(--card); border: 1px solid var(--card-border);
      color: var(--text); padding: 8px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.08em;
      border-radius: 4px; text-transform: uppercase;
    }
    .refresh-btn:hover { border-color: var(--text); background: var(--text); color: var(--bg); }

    /* ===== SCENARIO TABS ===== */
    .scenario-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap; margin-bottom: 36px;
    }
    .scenario-tabs {
      display: inline-flex;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 99px; padding: 5px;
    }
    .tab {
      padding: 9px 22px; border: none; background: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; font-size: 13px;
      color: var(--text-dim); cursor: pointer;
      border-radius: 99px; transition: all 0.25s;
      letter-spacing: -0.005em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .tab:hover:not(.active) { color: var(--text); }
    .tab.active { background: var(--text); color: var(--bg); }
    .tab .tab-sub {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em; opacity: 0.6;
      text-transform: uppercase; font-weight: 500;
    }
    .scenario-caption {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-faint);
      letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 500;
    }

    /* ===== SECTION LABEL ===== */
    .section-label {
      display: flex; align-items: center; gap: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.18em;
      font-weight: 500; margin: 48px 0 20px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--card-border);
    }
    .section-label:first-of-type { margin-top: 0; }

    /* ===== KPI CARDS ===== */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .cash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--accent);
      padding: 24px 26px 22px;
      border-radius: 6px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
    .kpi-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.18em;
      font-weight: 500; margin-bottom: 18px;
    }
    .kpi-value {
      font-size: 48px; font-weight: 700; color: var(--accent);
      letter-spacing: -0.035em; line-height: 0.95;
      font-variant-numeric: tabular-nums; margin-bottom: 18px;
    }
    .kpi-value .unit { font-size: 24px; font-weight: 500; color: var(--text-dim); margin-left: 6px; letter-spacing: -0.01em; }
    .kpi-meta {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .kpi-plan { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; font-weight: 500; }
    .kpi-delta {
      padding: 4px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: 'JetBrains Mono', monospace;
    }
    .kpi-delta.pos { background: var(--c-pos-soft); color: var(--c-pos-text); }
    .kpi-delta.neg { background: var(--c-neg-soft); color: var(--c-neg-text); }
    .kpi-delta.warn { background: var(--c-warn-soft); color: var(--c-warn-text); }
    .kpi-delta.neutral { background: var(--card-border-light); color: var(--text-dim); }
    .kpi-bar { height: 3px; background: rgba(0,0,0,0.05); overflow: hidden; border-radius: 99px; }
    .kpi-bar-fill { height: 100%; background: var(--accent); transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 99px; }

    /* ===== CHARTS ===== */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .charts-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
    .chart-card {
      background: var(--card); border: 1px solid var(--card-border);
      padding: 24px 28px 28px; border-radius: 6px;
    }
    .chart-card.full-width { grid-column: 1 / -1; }
    .chart-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 20px; gap: 16px;
    }
    .chart-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.015em; margin-bottom: 4px; }
    .chart-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-faint); font-weight: 500;
    }
    .chart-tag {
      padding: 4px 10px; border-radius: 99px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .chart-wrap { height: 260px; position: relative; }
    .chart-card.full-width .chart-wrap { height: 380px; }

    .legend-chips {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-top: 18px; padding-top: 18px;
      border-top: 1px solid var(--card-border-light);
    }
    .chip { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); }
    .chip-dot { width: 10px; height: 10px; border-radius: 99px; }
    .chip-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; font-variant-numeric: tabular-nums; margin-left: 4px;
    }
    .chip-label { color: var(--text-dim); font-weight: 500; }

    /* ===== TABLE ===== */
    .table-card {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 6px; overflow: hidden;
    }
    .table-wrap { overflow-x: auto; }
    .table-wrap::-webkit-scrollbar { height: 8px; }
    .table-wrap::-webkit-scrollbar-track { background: var(--card-border-light); }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1150px; }
    table.wide { min-width: 2200px; }
    thead { background: var(--card-border-light); }
    th {
      padding: 14px; text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; font-size: 10px;
      color: var(--text-dim); white-space: nowrap;
      border-bottom: 1px solid var(--card-border);
    }
    th:first-child {
      text-align: left; position: sticky; left: 0;
      background: var(--card-border-light); z-index: 2;
      min-width: 210px;
    }
    th.total-col { color: var(--text); border-left: 1px solid var(--card-border); }
    td {
      padding: 10px 14px; text-align: right;
      border-bottom: 1px solid var(--card-border-light);
      white-space: nowrap; color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
    }
    td:first-child {
      text-align: left; font-family: 'Plus Jakarta Sans', sans-serif;
      position: sticky; left: 0; background: var(--card); z-index: 1;
      font-size: 13px; font-weight: 500;
    }
    td.total-col { border-left: 1px solid var(--card-border); background: var(--card-border-light); font-weight: 700; }
    tr.group-header td {
      font-size: 12px; font-weight: 700; color: var(--text);
      padding: 22px 14px 8px; text-transform: uppercase;
      letter-spacing: 0.12em; background: var(--card) !important;
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid var(--card-border);
    }
    tr.group-header td .accent-mark {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 99px; margin-right: 8px;
      vertical-align: middle; background: var(--text-faint);
    }
    tr.plan td { color: var(--text-dim); }
    tr.fact td { color: var(--text); font-weight: 600; }
    tr.fact td:first-child::before { content: "▸"; color: var(--accent, var(--text)); margin-right: 6px; font-weight: 700; }
    tr.plan td:first-child::before { content: "◦"; color: var(--text-faint); margin-right: 6px; }
    .cell-pos { color: var(--c-pos) !important; font-weight: 700; }
    .cell-neg { color: var(--c-neg) !important; font-weight: 700; }
    .cell-future { color: var(--text-faint) !important; }

    /* ===== STATES ===== */
    .loading {
      padding: 120px 32px; text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-faint);
    }
    .error {
      max-width: 600px; margin: 80px auto;
      padding: 28px 32px; background: var(--card);
      border: 1px solid var(--c-neg);
      border-left: 4px solid var(--c-neg);
      border-radius: 6px; font-size: 13px; line-height: 1.7;
    }
    .error b {
      display: block; margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em; text-transform: uppercase;
      font-size: 11px; color: var(--c-neg);
    }
    .error code { background: var(--card-border-light); padding: 2px 6px; border-radius: 3px; font-size: 12px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1100px) {
      body { padding: 24px 20px 60px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .charts-grid, .charts-grid.three-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) { .cash-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .kpi-value { font-size: 40px; }
      .header { flex-direction: column; align-items: flex-start; }
      .title { font-size: 18px; }
      .scenario-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

    // ---------- Formatters ----------
    const fmtEur = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const sign = n < 0 ? '−' : '';
      return sign + '€' + Math.round(Math.abs(n)).toLocaleString('en-US');
    };
    const fmtEurDelta = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return (n >= 0 ? '+' : '−') + '€' + Math.round(Math.abs(n)).toLocaleString('en-US');
    };
    const fmtPct = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return (n * 100).toFixed(1) + '%';
    };
    const fmtPctDelta = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + 'pp';
    };
    const fmtInt = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return Math.round(n).toString();
    };
    const fmtIntDelta = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return (n >= 0 ? '+' : '') + Math.round(n).toString();
    };
    const fmtMonths = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return n.toFixed(1);
    };
    const fmtMonthsDelta = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      return (n >= 0 ? '+' : '') + n.toFixed(1) + ' mo';
    };
    const fmtMonthLabel = (n) => {
      if (n === null || n === undefined || isNaN(n) || n < 0) return '—';
      return 'M' + (Number.isInteger(n) ? n : n.toFixed(1));
    };

    // ---------- Math ----------
    const sum = (arr) => arr.reduce((a, b) => a + (Number(b) || 0), 0);
    const cumulative = (arr) => {
      let t = 0; return arr.map(v => t += (Number(v) || 0));
    };
    function findLastFactMonth(scenario) {
      const s = scenario.series;
      const arrs = ['ebitdaFact','grossProfitFact','clientServiceFact','monthlyInvestFact','monthlyValueFact','salesFact'];
      const length = (s.ebitdaFact || s.monthlyInvestFact || []).length;
      for (let i = length - 1; i >= 0; i--) {
        for (const key of arrs) {
          if (s[key] && Math.abs(s[key][i]) > 0.001) return i;
        }
      }
      return -1;
    }
    function findLastCashMonth(cashArr) {
      for (let i = cashArr.length - 1; i >= 0; i--) {
        if (Math.abs(cashArr[i]) > 0.001) return i;
      }
      return -1;
    }
    const MONTH_SHORT = {
      January:'Jan', February:'Feb', March:'Mar', April:'Apr',
      May:'May', June:'Jun', July:'Jul', August:'Aug',
      September:'Sep', October:'Oct', November:'Nov', December:'Dec'
    };
    const shortMonth = (m) => MONTH_SHORT[String(m).trim()] || String(m).trim();

    function runwayColor(months) {
      if (months >= 6) return 'var(--c-pos)';
      if (months >= 3) return 'var(--c-warn)';
      return 'var(--c-neg)';
    }

    // Find the three key channel points based on netInvestCumPlan.
    // Sign convention: investments are NEGATIVE (cash out), returns POSITIVE (cash in).
    // Peak = deepest hole (most negative), payback = zero-crossing upward.
    function calcChannelPoints(series) {
      const cum = series.netInvestCumPlan || [];
      const invMonthly = series.monthlyInvestPlan || [];
      const valMonthly = series.monthlyValuePlan || [];

      // Peak investment: argmin (most negative = deepest hole)
      let peakIdx = 0;
      for (let i = 1; i < cum.length; i++) {
        if (cum[i] < cum[peakIdx]) peakIdx = i;
      }

      // Operating breakeven: first month where monthly value >= monthly investment
      // (monthly values stay positive in their own rows, so logic unchanged)
      let opBreakIdx = -1;
      for (let i = 0; i < Math.min(invMonthly.length, valMonthly.length); i++) {
        if (valMonthly[i] >= invMonthly[i] && invMonthly[i] > 0) {
          opBreakIdx = i;
          break;
        }
      }

      // Payback: where cum crosses zero from negative to positive (with linear interp)
      let paybackIdx = -1;
      let paybackInterp = -1;
      for (let i = 1; i < cum.length; i++) {
        if (cum[i - 1] <= 0 && cum[i] > 0) {
          paybackIdx = i;
          const fraction = -cum[i - 1] / (cum[i] - cum[i - 1]);
          paybackInterp = (i - 1) + fraction + 1; // +1 → 1-indexed month
          break;
        }
      }

      // Net return at end (now directly positive in the data)
      const lastIdx = cum.length - 1;
      const netReturn = cum[lastIdx];

      return {
        peakIdx, peakMonth: peakIdx + 1,
        peakValue: Math.abs(cum[peakIdx]),  // absolute, since KPI says "invested"
        opBreakIdx, opBreakMonth: opBreakIdx + 1,
        paybackIdx, paybackMonth: paybackInterp,
        netReturn,
      };
    }

    // ---------- State ----------
    let dashboardData = null;
    let currentScenario = 'baseline';
    const charts = new Map();

    function destroyCharts() {
      charts.forEach(c => { try { c.destroy(); } catch (e) {} });
      charts.clear();
    }

    function setScenario(name) {
      if (currentScenario === name) return;
      currentScenario = name;
      render();
    }

    async function load() {
      const btn = document.querySelector('.refresh-btn');
      if (btn) { btn.disabled = true; btn.textContent = '… Loading'; }
      if (isDemoMode()) { dashboardData = DEMO_DATA; render(); return; }
      try {
        const res = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        dashboardData = data;
        render();
      } catch (err) {
        destroyCharts();
        document.getElementById('app').innerHTML = `
          <div class="error">
            <b>Failed to load data</b>
            ${err.message}<br><br>
            Check that the Apps Script is deployed with <code>Anyone</code> access
            and that <code>APPS_SCRIPT_URL</code> is set correctly.
          </div>`;
      }
    }

    // ---------- Render dispatch ----------
    function render() {
      destroyCharts();
      const d = dashboardData;
      const scenario = d.scenarios[currentScenario];
      const isChannel = currentScenario === 'channel';
      const isGrowth = currentScenario === 'growth';

      const dateStamp = new Date(d.updatedAt).toLocaleDateString('en-US', {
        day: 'numeric', month: 'short', year: 'numeric'
      });

      const tabsHtml = ['baseline', 'growth', 'channel'].map(name => {
        const sc = d.scenarios[name];
        const active = name === currentScenario;
        return `<button class="tab ${active ? 'active' : ''}" onclick="setScenario('${name}')">
          <span>${sc.label}</span><span class="tab-sub">${SCENARIO_SUBS[name]}</span>
        </button>`;
      }).join('');

      const headerHtml = `
        <header class="header">
          <div class="logo-section">
            <div class="logo">€</div>
            <div class="title">FY 2026 <span class="sep">/</span><span class="sub">Financial Dashboard</span></div>
          </div>
          <div class="header-meta">
            <div class="date-stamp">${dateStamp}</div>
            <div class="live-pill ${isDemoMode() ? 'demo' : ''}">${isDemoMode() ? 'Demo · Sample data' : 'Live · Google Sheets'}</div>
            <button class="refresh-btn" onclick="load()">↻ Refresh</button>
          </div>
        </header>
        <div class="scenario-row">
          <div class="scenario-tabs">${tabsHtml}</div>
          <div class="scenario-caption">${SCENARIO_CAPTIONS[currentScenario]}</div>
        </div>`;

      const bodyHtml = isChannel
        ? buildChannelBody(scenario)
        : buildPLBody(d, scenario, isGrowth);

      document.getElementById('app').innerHTML = headerHtml + bodyHtml;

      if (isChannel) drawChannelCharts(scenario);
      else drawPLCharts(d, scenario, isGrowth);
    }

    // ============================================================
    //  P&L view (Baseline / Growth)
    // ============================================================
    function buildPLBody(d, scenario, isGrowth) {
      const lastIdx = findLastFactMonth(scenario);
      const monthsThrough = Math.max(lastIdx + 1, 0);
      const months = scenario.months || d.months;
      const s = scenario.series;

      const ytd = {
        ebitdaPlan:       sum(s.ebitdaPlan.slice(0, monthsThrough)),
        ebitdaFact:       sum(s.ebitdaFact.slice(0, monthsThrough)),
        grossProfitPlan:  sum(s.grossProfitPlan.slice(0, monthsThrough)),
        grossProfitFact:  sum(s.grossProfitFact.slice(0, monthsThrough)),
        salesPlan:        sum(s.salesPlan.slice(0, monthsThrough)),
        salesFact:        sum(s.salesFact.slice(0, monthsThrough)),
      };
      const marginPlan = lastIdx >= 0 ? s.ebitdaMarginPlan[lastIdx] : 0;
      const marginFact = lastIdx >= 0 ? s.ebitdaMarginFact[lastIdx] : 0;
      const lastMonth  = lastIdx >= 0 ? shortMonth(months[lastIdx]) : '—';
      const firstMonth = shortMonth(months[0]);

      return `
        <div class="section-label">Key metrics · YTD ${firstMonth} — ${lastMonth} 2026 · ${scenario.label}</div>
        <div class="kpi-grid">
          ${kpiCard('EBITDA · YTD', fmtEur(ytd.ebitdaFact), fmtEur(ytd.ebitdaPlan), ytd.ebitdaFact, ytd.ebitdaPlan, fmtEurDelta, 'var(--c-ebitda)')}
          ${kpiCard('EBITDA Margin · ' + lastMonth, fmtPct(marginFact), fmtPct(marginPlan), marginFact, marginPlan, fmtPctDelta, 'var(--c-margin)')}
          ${kpiCard('Gross Profit · YTD', fmtEur(ytd.grossProfitFact), fmtEur(ytd.grossProfitPlan), ytd.grossProfitFact, ytd.grossProfitPlan, fmtEurDelta, 'var(--c-gp)')}
          ${kpiCard('Sales · YTD', fmtInt(ytd.salesFact), fmtInt(ytd.salesPlan), ytd.salesFact, ytd.salesPlan, fmtIntDelta, 'var(--c-sales)')}
        </div>
        ${isGrowth ? renderCashSection(scenario) : ''}
        <div class="section-label">Cumulative trends · plan vs actual</div>
        <div class="charts-grid">
          ${chartCard('chart-margin',  'EBITDA Margin %',  'Monthly · plan vs actual',     '#7c3aed')}
          ${chartCard('chart-ebitda',  'EBITDA',           'Cumulative · €',               '#ea580c')}
          ${chartCard('chart-gp',      'Gross Profit',     'Cumulative · €',               '#0d9488')}
          ${chartCard('chart-sales',   'Sales',            'Cumulative · units',           '#2563eb')}
        </div>
        <div class="section-label">Cross-metric performance · how the three actuals move together</div>
        <div class="charts-grid">
          <div class="chart-card full-width">
            <div class="chart-header">
              <div>
                <div class="chart-title">Performance Index</div>
                <div class="chart-subtitle">Cumulative actual as % of annual plan · linear pace = perfect pacing</div>
              </div>
              <span class="chart-tag" style="background: #f0ebe1; color: #6e6b66;">Same scale</span>
            </div>
            <div class="chart-wrap"><canvas id="chart-cross"></canvas></div>
            <div class="legend-chips" id="legend-cross"></div>
          </div>
        </div>
        <div class="section-label">Monthly breakdown · plan vs actual by month</div>
        <div class="table-card"><div class="table-wrap">${buildPLTable(scenario, lastIdx, isGrowth)}</div></div>`;
    }

    function renderCashSection(scenario) {
      const cash = scenario.series.cashOnHand || [];
      const runway = scenario.series.cashRunway || [];
      const lastCashIdx = findLastCashMonth(cash);
      if (lastCashIdx < 0) return '';

      const currentCash = cash[lastCashIdx];
      const prevCash = lastCashIdx > 0 ? cash[lastCashIdx - 1] : currentCash;
      const cashDelta = currentCash - prevCash;
      const currentRunway = runway[lastCashIdx];
      const prevRunway = lastCashIdx > 0 ? runway[lastCashIdx - 1] : currentRunway;
      const runwayDelta = currentRunway - prevRunway;
      const rwColor = runwayColor(currentRunway);

      const cashCard = `
        <div class="kpi-card" style="--accent: var(--c-cash)">
          <div class="kpi-label">Cash on hand · current</div>
          <div class="kpi-value">${fmtEur(currentCash)}</div>
          <div class="kpi-meta">
            <span class="kpi-plan">Last month ${fmtEur(prevCash)}</span>
            <span class="kpi-delta ${cashDelta >= 0 ? 'pos' : 'neg'}">${fmtEurDelta(cashDelta)}</span>
          </div>
          <div class="kpi-bar"><div class="kpi-bar-fill" style="width:100%"></div></div>
        </div>`;
      const runwayCard = `
        <div class="kpi-card" style="--accent: ${rwColor}">
          <div class="kpi-label">Cash Runway · months</div>
          <div class="kpi-value">${fmtMonths(currentRunway)}<span class="unit">mo</span></div>
          <div class="kpi-meta">
            <span class="kpi-plan">Last month ${fmtMonths(prevRunway)}</span>
            <span class="kpi-delta ${runwayDelta >= 0 ? 'pos' : 'neg'}">${fmtMonthsDelta(runwayDelta)}</span>
          </div>
          <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(currentRunway * 10, 100)}%"></div></div>
        </div>`;

      return `
        <div class="section-label">Cash position · liquidity &amp; runway</div>
        <div class="cash-grid">${cashCard}${runwayCard}</div>
        <div class="charts-grid">
          <div class="chart-card full-width">
            <div class="chart-header">
              <div>
                <div class="chart-title">Cash trajectory</div>
                <div class="chart-subtitle">Cash on hand by month · dashed = projection at recent burn rate</div>
              </div>
              <span class="chart-tag" style="background: #cffafe; color: #0891b2;">Burn rate</span>
            </div>
            <div class="chart-wrap"><canvas id="chart-cash"></canvas></div>
          </div>
        </div>`;
    }

    // ============================================================
    //  Channel view (J-curve)
    // ============================================================
    function buildChannelBody(scenario) {
      const points = calcChannelPoints(scenario.series);
      const months = scenario.months;
      const s = scenario.series;
      const lastFactIdx = findLastFactMonth(scenario);

      const kpis = `
        <div class="kpi-grid">
          ${channelKpiCard('Peak investment', fmtEur(points.peakValue), points.peakIdx >= 0 ? ('Month ' + points.peakMonth) : '—', 'Max capital at risk', 'var(--c-ebitda)', 'warn')}
          ${channelKpiCard('Operating B/E', fmtMonthLabel(points.opBreakMonth), points.opBreakIdx >= 0 ? 'Channel covers monthly cost' : 'Not within horizon', 'Self-sustaining point', 'var(--c-warn)', 'neutral')}
          ${channelKpiCard('Payback', fmtMonthLabel(points.paybackMonth), points.paybackMonth > 0 ? ('Cumulative net hits zero') : 'Not within horizon', 'Full investment recovery', 'var(--c-pos)', 'pos')}
          ${channelKpiCard('Net return · M' + months.length, fmtEur(points.netReturn), 'After recovery of investment', 'Total value created', 'var(--c-channel)', points.netReturn >= 0 ? 'pos' : 'neg')}
        </div>`;

      return `
        <div class="section-label">Channel ROI · key inflection points</div>
        ${kpis}

        <div class="section-label">J-curve · cumulative net investment position</div>
        <div class="charts-grid">
          <div class="chart-card full-width">
            <div class="chart-header">
              <div>
                <div class="chart-title">Net cash position from channel</div>
                <div class="chart-subtitle">Positive = still invested · zero crossing = payback · negative = pure return</div>
              </div>
              <span class="chart-tag" style="background: #fce7f3; color: #be185d;">24-month projection</span>
            </div>
            <div class="chart-wrap"><canvas id="chart-jcurve"></canvas></div>
            <div class="legend-chips">
              <div class="chip"><div class="chip-dot" style="background: var(--c-ebitda)"></div><span class="chip-label">Peak (M${points.peakMonth})</span><span class="chip-value" style="color: var(--c-ebitda)">${fmtEur(points.peakValue)}</span></div>
              <div class="chip"><div class="chip-dot" style="background: var(--c-warn)"></div><span class="chip-label">Op B/E</span><span class="chip-value" style="color: var(--c-warn)">${fmtMonthLabel(points.opBreakMonth)}</span></div>
              <div class="chip"><div class="chip-dot" style="background: var(--c-pos)"></div><span class="chip-label">Payback</span><span class="chip-value" style="color: var(--c-pos)">${fmtMonthLabel(points.paybackMonth)}</span></div>
            </div>
          </div>
        </div>

        <div class="section-label">Cumulative trends · plan vs actual</div>
        <div class="charts-grid three-col">
          ${chartCard('chart-ch-invest', 'Investments', 'Cumulative · €', '#ea580c')}
          ${chartCard('chart-ch-value',  'Channel value (Gross Margin)', 'Cumulative · €', '#0d9488')}
          ${chartCard('chart-ch-sales',  'Channel sales', 'Cumulative · units', '#2563eb')}
        </div>

        <div class="section-label">Monthly breakdown · 24 months</div>
        <div class="table-card"><div class="table-wrap">${buildChannelTable(scenario, lastFactIdx)}</div></div>`;
    }

    function channelKpiCard(label, bigValue, subLine, secondaryLabel, accentColor, deltaCls) {
      return `
        <div class="kpi-card" style="--accent: ${accentColor}">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value" style="font-size: 42px;">${bigValue}</div>
          <div class="kpi-meta">
            <span class="kpi-plan">${secondaryLabel}</span>
            <span class="kpi-delta ${deltaCls}">${subLine}</span>
          </div>
          <div class="kpi-bar"><div class="kpi-bar-fill" style="width:100%"></div></div>
        </div>`;
    }

    function buildChannelTable(scenario, lastFactIdx) {
      const months = scenario.months;
      const s = scenario.series;
      const monthHead = months.map(mo => `<th>${mo}</th>`).join('');

      const row = (label, arr, fmt, isFact = false, accent = '#be185d') => {
        const cells = arr.map((v, i) => {
          if (isFact && i > lastFactIdx) return `<td class="cell-future">—</td>`;
          return `<td>${fmt(v)}</td>`;
        }).join('');
        const total = arr.reduce((a, b) => a + (Number(b) || 0), 0);
        const rowStyle = `style="--accent: ${accent}"`;
        return `<tr class="${isFact ? 'fact' : 'plan'}" ${rowStyle}>
          <td>${label} · ${isFact ? 'Actual' : 'Plan'}</td>${cells}
          <td class="total-col">${fmt(total)}</td>
        </tr>`;
      };

      const group = (title, accentColor, rowsHtml) =>
        `<tr class="group-header"><td colspan="${months.length + 2}"><span class="accent-mark" style="background:${accentColor}"></span>${title}</td></tr>` + rowsHtml;

      // Cumulative net plan/fact rows (negative = invested, positive = returned)
      const cumNetRow = (label, arr, isFact = false) => {
        const cells = arr.map((v, i) => {
          if (isFact && i > lastFactIdx) return `<td class="cell-future">—</td>`;
          const cls = v < 0 ? 'cell-neg' : (v > 0 ? 'cell-pos' : '');
          return `<td class="${cls}">${fmtEur(v)}</td>`;
        }).join('');
        const last = arr[arr.length - 1];
        return `<tr class="${isFact ? 'fact' : 'plan'}" style="--accent: var(--c-channel)">
          <td>${label} · ${isFact ? 'Actual' : 'Plan'}</td>${cells}
          <td class="total-col">${fmtEur(last)}</td>
        </tr>`;
      };

      return `<table class="wide">
        <thead><tr><th>Metric</th>${monthHead}<th class="total-col">Total</th></tr></thead>
        <tbody>
          ${group('Monthly investments', '#ea580c',
            row('Investments', s.monthlyInvestPlan, fmtEur, false, '#ea580c') +
            row('Investments', s.monthlyInvestFact, fmtEur, true,  '#ea580c'))}
          ${group('Channel value · gross margin', '#0d9488',
            row('Value', s.monthlyValuePlan, fmtEur, false, '#0d9488') +
            row('Value', s.monthlyValueFact, fmtEur, true,  '#0d9488'))}
          ${group('Sales (units)', '#2563eb',
            row('Sales', s.salesPlan, fmtInt, false, '#2563eb') +
            row('Sales', s.salesFact, fmtInt, true,  '#2563eb'))}
          ${group('Cumulative net position', '#be185d',
            cumNetRow('Net invested', s.netInvestCumPlan, false) +
            cumNetRow('Net invested', s.netInvestCumFact, true))}
        </tbody>
      </table>`;
    }

    function drawChannelCharts(scenario) {
      const labels = scenario.months;
      const s = scenario.series;
      const points = calcChannelPoints(s);
      const lastFactIdx = findLastFactMonth(scenario);

      // ===== J-curve main chart =====
      const factWithGap = s.netInvestCumFact.map((v, i) => i <= lastFactIdx ? v : null);

      // Build annotations for the 3 key points
      const annotations = {
        zeroLine: {
          type: 'line', yMin: 0, yMax: 0,
          borderColor: 'rgba(0,0,0,0.2)', borderWidth: 1, borderDash: [3, 4],
        },
        peakLine: {
          type: 'line',
          xMin: points.peakIdx, xMax: points.peakIdx,
          borderColor: '#ea580c', borderWidth: 1.5, borderDash: [4, 4],
          label: {
            display: true,
            content: `Peak · M${points.peakMonth}`,
            position: 'start',
            backgroundColor: '#ea580c', color: '#fff',
            font: { size: 10, weight: 'bold', family: "'JetBrains Mono', monospace" },
            padding: { top: 4, bottom: 4, left: 8, right: 8 },
            borderRadius: 4, yAdjust: 0,
          }
        }
      };
      if (points.opBreakIdx >= 0) {
        annotations.opBreakLine = {
          type: 'line',
          xMin: points.opBreakIdx, xMax: points.opBreakIdx,
          borderColor: '#d97706', borderWidth: 1.5, borderDash: [4, 4],
          label: {
            display: true,
            content: `Op B/E · M${points.opBreakMonth}`,
            position: 'start', yAdjust: 24,
            backgroundColor: '#d97706', color: '#fff',
            font: { size: 10, weight: 'bold', family: "'JetBrains Mono', monospace" },
            padding: { top: 4, bottom: 4, left: 8, right: 8 },
            borderRadius: 4,
          }
        };
      }
      if (points.paybackIdx >= 0) {
        annotations.paybackLine = {
          type: 'line',
          xMin: points.paybackIdx, xMax: points.paybackIdx,
          borderColor: '#16a34a', borderWidth: 1.5, borderDash: [4, 4],
          label: {
            display: true,
            content: `Payback · ${fmtMonthLabel(points.paybackMonth)}`,
            position: 'end',
            backgroundColor: '#16a34a', color: '#fff',
            font: { size: 10, weight: 'bold', family: "'JetBrains Mono', monospace" },
            padding: { top: 4, bottom: 4, left: 8, right: 8 },
            borderRadius: 4,
          }
        };
      }

      const jctx = document.getElementById('chart-jcurve');
      if (jctx) {
        const chart = new Chart(jctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Plan',
                data: s.netInvestCumPlan,
                borderColor: '#be185d',
                fill: {
                  target: 'origin',
                  above: 'rgba(22, 163, 74, 0.18)',  // green above zero (recovery)
                  below: 'rgba(220, 38, 38, 0.10)',  // red below zero (investment)
                },
                borderWidth: 2.5,
                tension: 0.32,
                pointRadius: 0, pointHoverRadius: 6,
                pointBackgroundColor: '#be185d', pointBorderColor: '#fff', pointBorderWidth: 2,
              },
              {
                label: 'Actual',
                data: factWithGap,
                borderColor: '#7c1d4d',
                backgroundColor: 'transparent',
                borderWidth: 3,
                tension: 0.32,
                pointRadius: 4, pointHoverRadius: 7,
                pointBackgroundColor: '#7c1d4d', pointBorderColor: '#fff', pointBorderWidth: 2,
                fill: false, spanGaps: false,
              }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 900, easing: 'easeOutQuart' },
            interaction: { mode: 'index', intersect: false },
            plugins: {
              annotation: { annotations: annotations },
              legend: {
                display: true, position: 'top', align: 'end',
                labels: {
                  color: '#6e6b66',
                  font: { family: "'JetBrains Mono', monospace", size: 10, weight: '500' },
                  usePointStyle: true, pointStyle: 'line',
                  boxWidth: 18, boxHeight: 2, padding: 14,
                }
              },
              tooltip: tooltipConfig((c) => `  ${c.dataset.label}: ${c.parsed.y === null ? '—' : fmtEur(c.parsed.y)}`),
            },
            scales: chartScales((v) => fmtEur(v))
          }
        });
        charts.set('chart-jcurve', chart);
      }

      // ===== Three smaller cumulative charts =====
      const drawPair = (canvasId, planArr, factArr, color, fmt) => {
        const factWithGap = factArr.map((v, i) => i <= lastFactIdx ? v : null);
        drawLineChart(canvasId, labels, [
          { label: 'Plan',   data: planArr,     color: color, alpha: 0.32, dashed: true },
          { label: 'Actual', data: factWithGap, color: color, alpha: 1.0,  dashed: false }
        ], fmt);
      };

      drawPair('chart-ch-invest',
        cumulative(s.monthlyInvestPlan), cumulative(s.monthlyInvestFact),
        '#ea580c', (v) => fmtEur(v));
      drawPair('chart-ch-value',
        cumulative(s.monthlyValuePlan), cumulative(s.monthlyValueFact),
        '#0d9488', (v) => fmtEur(v));
      drawPair('chart-ch-sales',
        cumulative(s.salesPlan), cumulative(s.salesFact),
        '#2563eb', (v) => Math.round(v) + ' u');
    }

    // ============================================================
    //  Shared helpers
    // ============================================================
    function kpiCard(label, factStr, planStr, fact, plan, deltaFmt, accentColor) {
      const delta = (fact || 0) - (plan || 0);
      const isPositive = delta >= 0;
      const pct = (plan && plan !== 0) ? (fact / plan) * 100 : 0;
      const barWidth = Math.min(Math.max(pct, 0), 130);
      return `
        <div class="kpi-card" style="--accent: ${accentColor}">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value">${factStr}</div>
          <div class="kpi-meta">
            <span class="kpi-plan">Plan ${planStr}</span>
            <span class="kpi-delta ${isPositive ? 'pos' : 'neg'}">${deltaFmt(delta)}</span>
          </div>
          <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${barWidth}%"></div></div>
        </div>`;
    }

    function chartCard(canvasId, title, subtitle, accentColor) {
      return `
        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">${title}</div>
              <div class="chart-subtitle">${subtitle}</div>
            </div>
            <span class="chart-tag" style="background: ${accentColor}1f; color: ${accentColor};">Plan vs Actual</span>
          </div>
          <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
        </div>`;
    }

    function buildPLTable(scenario, lastIdx, isGrowth) {
      const months = scenario.months || dashboardData.months;
      const s = scenario.series;
      const t = scenario.totals;
      const monthHead = months.map(mo => `<th>${shortMonth(mo)}</th>`).join('');
      const tf = (val, arr) => val || sum(arr);

      const renderRow = (label, planArr, factArr, planTotal, factTotal, fmt, isCost = false, isFact = false, accent = '') => {
        const cells = (isFact ? factArr : planArr).map((v, i) => {
          if (isFact && i > lastIdx) return `<td class="cell-future">—</td>`;
          if (isFact) {
            const planV = planArr[i];
            let cls = '';
            if (planV !== 0 && v !== 0) {
              const diff = v - planV;
              cls = isCost ? (diff <= 0 ? 'cell-pos' : 'cell-neg') : (diff >= 0 ? 'cell-pos' : 'cell-neg');
            }
            return `<td class="${cls}">${fmt(v)}</td>`;
          }
          return `<td>${fmt(v)}</td>`;
        }).join('');
        const total = isFact ? factTotal : planTotal;
        const rowStyle = accent ? `style="--accent: ${accent}"` : '';
        return `<tr class="${isFact ? 'fact' : 'plan'}" ${rowStyle}>
          <td>${label} · ${isFact ? 'Actual' : 'Plan'}</td>${cells}
          <td class="total-col">${fmt(total)}</td>
        </tr>`;
      };

      const group = (title, accentColor, rowsHtml) =>
        `<tr class="group-header"><td colspan="${months.length + 2}"><span class="accent-mark" style="background:${accentColor}"></span>${title}</td></tr>` + rowsHtml;

      const pair = (label, pArr, fArr, pT, fT, fmt, isCost = false, accent = '') =>
        renderRow(label, pArr, fArr, pT, fT, fmt, isCost, false, accent) +
        renderRow(label, pArr, fArr, pT, fT, fmt, isCost, true, accent);

      const sPT = t.salesPlan || sum(s.salesPlan);
      const sFT = tf(t.salesFact, s.salesFact);

      let cashSection = '';
      if (isGrowth && s.cashOnHand) {
        const cashLastIdx = findLastCashMonth(s.cashOnHand);
        const cashCells = s.cashOnHand.map((v, i) => {
          if (i > cashLastIdx) return `<td class="cell-future">—</td>`;
          return `<td>${fmtEur(v)}</td>`;
        }).join('');
        const runwayCells = s.cashRunway.map((v, i) => {
          if (i > cashLastIdx) return `<td class="cell-future">—</td>`;
          const cls = v < 3 ? 'cell-neg' : (v < 6 ? '' : 'cell-pos');
          return `<td class="${cls}">${fmtMonths(v)}</td>`;
        }).join('');
        cashSection = group('Cash position', 'var(--c-cash)',
          `<tr class="fact" style="--accent: var(--c-cash)">
            <td>Cash on hand</td>${cashCells}<td class="total-col">—</td>
          </tr>
          <tr class="fact" style="--accent: var(--c-cash)">
            <td>Runway · months</td>${runwayCells}<td class="total-col">—</td>
          </tr>`);
      }

      return `<table>
        <thead><tr><th>Metric</th>${monthHead}<th class="total-col">Total</th></tr></thead>
        <tbody>
          ${group('EBITDA Margin %', '#7c3aed',
            pair('Margin', s.ebitdaMarginPlan, s.ebitdaMarginFact, t.ebitdaMarginPlan, t.ebitdaMarginFact, fmtPct, false, '#7c3aed'))}
          ${group('EBITDA', '#ea580c',
            pair('EBITDA', s.ebitdaPlan, s.ebitdaFact, t.ebitdaPlan, tf(t.ebitdaFact, s.ebitdaFact), fmtEur, false, '#ea580c'))}
          ${group('Operating costs', '#a8a59f',
            pair('Client service', s.clientServicePlan, s.clientServiceFact, t.clientServicePlan, tf(t.clientServiceFact, s.clientServiceFact), fmtEur, true) +
            pair('BD',             s.bdPlan,            s.bdFact,            t.bdPlan,            tf(t.bdFact, s.bdFact),                       fmtEur, true) +
            pair('Back office',    s.backOfficePlan,    s.backOfficeFact,    t.backOfficePlan,    tf(t.backOfficeFact, s.backOfficeFact),       fmtEur, true))}
          ${group('Gross Profit', '#0d9488',
            pair('Gross Profit', s.grossProfitPlan, s.grossProfitFact, t.grossProfitPlan, tf(t.grossProfitFact, s.grossProfitFact), fmtEur, false, '#0d9488'))}
          ${group('Sales (units)', '#2563eb',
            pair('Sales', s.salesPlan, s.salesFact, sPT, sFT, fmtInt, false, '#2563eb'))}
          ${cashSection}
        </tbody>
      </table>`;
    }

    function drawPLCharts(d, scenario, isGrowth) {
      const labels = (scenario.months || d.months).map(shortMonth);
      const s = scenario.series;
      const lastIdx = findLastFactMonth(scenario);

      const drawPair = (canvasId, planArr, factArr, color, fmt) => {
        const factWithGap = factArr.map((v, i) => i <= lastIdx ? v : null);
        drawLineChart(canvasId, labels, [
          { label: 'Plan',   data: planArr,     color: color, alpha: 0.32, dashed: true },
          { label: 'Actual', data: factWithGap, color: color, alpha: 1.0,  dashed: false }
        ], fmt);
      };

      const planMargin = s.ebitdaMarginPlan.map(v => v * 100);
      const factMargin = s.ebitdaMarginFact.map(v => v * 100);
      drawPair('chart-margin', planMargin, factMargin, '#7c3aed', v => v.toFixed(1) + '%');
      drawPair('chart-ebitda', cumulative(s.ebitdaPlan), cumulative(s.ebitdaFact),
               '#ea580c', v => fmtEur(v));
      drawPair('chart-gp', cumulative(s.grossProfitPlan), cumulative(s.grossProfitFact),
               '#0d9488', v => fmtEur(v));
      drawPair('chart-sales', cumulative(s.salesPlan), cumulative(s.salesFact),
               '#2563eb', v => Math.round(v) + ' u');

      drawCrossMetric(d, scenario, lastIdx, labels);
      if (isGrowth) drawCashChart(d, scenario);
    }

    function drawCrossMetric(d, scenario, lastIdx, labels) {
      const annualSales  = sum(scenario.series.salesPlan);
      const annualGP     = sum(scenario.series.grossProfitPlan);
      const annualEbitda = sum(scenario.series.ebitdaPlan);
      const cumSales = cumulative(scenario.series.salesFact);
      const cumGP    = cumulative(scenario.series.grossProfitFact);
      const cumE     = cumulative(scenario.series.ebitdaFact);
      const pctOf = (arr, total) => arr.map((v, i) =>
        (i <= lastIdx && total) ? (v / total) * 100 : null);
      const salesPct  = pctOf(cumSales,  annualSales);
      const gpPct     = pctOf(cumGP,     annualGP);
      const ebitdaPct = pctOf(cumE,      annualEbitda);
      const linearPace = labels.map((_, i) => Math.round(((i + 1) / labels.length) * 100 * 10) / 10);

      const ctx = document.getElementById('chart-cross');
      if (!ctx) return;
      const datasets = [
        { label: 'Sales',        data: salesPct,   color: '#2563eb' },
        { label: 'Gross Profit', data: gpPct,      color: '#0d9488' },
        { label: 'EBITDA',       data: ebitdaPct,  color: '#ea580c' },
        { label: 'Linear pace',  data: linearPace, color: '#a8a59f', dashed: true, isRef: true },
      ];
      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets.map(ds => ({
            label: ds.label, data: ds.data,
            borderColor: ds.color, backgroundColor: ds.color + '14',
            borderWidth: ds.isRef ? 1.5 : 2.5,
            borderDash: ds.dashed ? [4, 4] : [],
            tension: 0.32,
            pointRadius: ds.isRef ? 0 : 3, pointHoverRadius: ds.isRef ? 0 : 6,
            pointBackgroundColor: ds.color, pointBorderColor: '#fff', pointBorderWidth: 2,
            fill: false, spanGaps: false,
          }))
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 900, easing: 'easeOutQuart' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: tooltipConfig((c) => `  ${c.dataset.label}: ${c.parsed.y === null ? '—' : c.parsed.y.toFixed(1) + '%'}`),
          },
          scales: chartScales((v) => v + '%')
        }
      });
      charts.set('chart-cross', chart);

      const curIdx = lastIdx >= 0 ? lastIdx : 0;
      const legend = document.getElementById('legend-cross');
      const items = [
        { label: 'Sales',        color: '#2563eb', value: salesPct[curIdx] },
        { label: 'Gross Profit', color: '#0d9488', value: gpPct[curIdx] },
        { label: 'EBITDA',       color: '#ea580c', value: ebitdaPct[curIdx] },
        { label: 'Linear pace',  color: '#a8a59f', value: linearPace[curIdx], ref: true },
      ];
      legend.innerHTML = items.map(it => `
        <div class="chip">
          <div class="chip-dot" style="background:${it.color}${it.ref ? '; border: 1px dashed #6e6b66' : ''}"></div>
          <span class="chip-label">${it.label}</span>
          <span class="chip-value" style="color:${it.color}">${it.value === null || isNaN(it.value) ? '—' : it.value.toFixed(1) + '%'}</span>
        </div>
      `).join('');
    }

    function drawCashChart(d, scenario) {
      const cash = scenario.series.cashOnHand;
      const lastCashIdx = findLastCashMonth(cash);
      if (lastCashIdx < 0) return;
      const labels = (scenario.months || d.months).map(shortMonth);
      const actualLine = cash.map((v, i) => i <= lastCashIdx ? v : null);

      let recentBurn = 0;
      const window = Math.min(3, lastCashIdx);
      if (window >= 1) {
        let total = 0;
        for (let i = lastCashIdx - window + 1; i <= lastCashIdx; i++) {
          total += cash[i] - cash[i - 1];
        }
        recentBurn = total / window;
      }
      const projectionLine = labels.map((_, i) => {
        if (i < lastCashIdx) return null;
        if (i === lastCashIdx) return cash[lastCashIdx];
        return cash[lastCashIdx] + recentBurn * (i - lastCashIdx);
      });
      const zeroLine = labels.map(() => 0);

      const ctx = document.getElementById('chart-cash');
      if (!ctx) return;
      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Actual', data: actualLine, borderColor: '#0891b2',
              backgroundColor: '#0891b220', borderWidth: 2.5, tension: 0.3,
              pointRadius: 4, pointHoverRadius: 7,
              pointBackgroundColor: '#0891b2', pointBorderColor: '#fff', pointBorderWidth: 2,
              fill: true, spanGaps: false },
            { label: 'Projection', data: projectionLine, borderColor: '#0891b2',
              backgroundColor: 'transparent', borderWidth: 1.8, borderDash: [5, 4],
              tension: 0.3, pointRadius: 0, fill: false, spanGaps: false },
            { label: 'Zero', data: zeroLine, borderColor: '#dc262640',
              backgroundColor: 'transparent', borderWidth: 1, borderDash: [2, 4],
              tension: 0, pointRadius: 0, fill: false },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 800, easing: 'easeOutQuart' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              ...tooltipConfig((c) => `  ${c.dataset.label}: ${c.parsed.y === null ? '—' : fmtEur(c.parsed.y)}`),
              filter: (item) => item.dataset.label !== 'Zero',
            }
          },
          scales: chartScales((v) => fmtEur(v))
        }
      });
      charts.set('chart-cash', chart);
    }

    function drawLineChart(canvasId, labels, datasets, fmt) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: datasets.map(ds => ({
            label: ds.label, data: ds.data,
            borderColor: ds.color + (ds.alpha < 1 ? Math.round(ds.alpha * 255).toString(16).padStart(2,'0') : ''),
            backgroundColor: ds.color + '12',
            borderWidth: ds.dashed ? 1.8 : 2.5,
            borderDash: ds.dashed ? [5, 4] : [],
            tension: 0.32,
            pointRadius: 0, pointHoverRadius: 6,
            pointBackgroundColor: ds.color, pointBorderColor: '#fff', pointBorderWidth: 2,
            fill: false, spanGaps: false,
          }))
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 800, easing: 'easeOutQuart' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true, position: 'top', align: 'end',
              labels: {
                color: '#6e6b66',
                font: { family: "'JetBrains Mono', monospace", size: 10, weight: '500' },
                usePointStyle: true, pointStyle: 'line',
                boxWidth: 18, boxHeight: 2, padding: 14,
              }
            },
            tooltip: tooltipConfig((c) => `  ${c.dataset.label}: ${fmt(c.parsed.y)}`)
          },
          scales: chartScales((v) => fmt(v))
        }
      });
      charts.set(canvasId, chart);
    }

    function tooltipConfig(labelFn) {
      return {
        backgroundColor: '#ffffff',
        titleColor: '#1a1a1a', bodyColor: '#1a1a1a',
        borderColor: '#e3dfd6', borderWidth: 1,
        padding: 12, cornerRadius: 6, displayColors: true,
        titleFont: { family: "'Plus Jakarta Sans', sans-serif", size: 12, weight: '700' },
        bodyFont:  { family: "'JetBrains Mono', monospace", size: 11 },
        callbacks: { label: labelFn }
      };
    }

    function chartScales(yTickFn) {
      return {
        x: {
          grid: { display: false },
          border: { color: '#e3dfd6' },
          ticks: { color: '#6e6b66', font: { family: "'JetBrains Mono', monospace", size: 10, weight: '500' }, maxRotation: 0, autoSkip: true }
        },
        y: {
          grid: { color: '#ece8df' },
          border: { display: false },
          ticks: { color: '#6e6b66', font: { family: "'JetBrains Mono', monospace", size: 10 }, callback: yTickFn }
        }
      };
    }

    load();
  </script>
